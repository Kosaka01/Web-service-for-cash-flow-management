{% extends "base.html" %}

{% block content %}
<div class="app-card p-4">
  <h1 class="h4 mb-3">Удалить запись</h1>
  <p class="mb-4">
    Вы уверены, что хотите удалить запись от {{ record.date|date:"d.m.Y" }}
    на сумму {{ record.amount }} ₽?
  </p>
  <form method="post">
    {% csrf_token %}
    <div class="d-flex gap-2">
      <button class="btn btn-danger" type="submit">Удалить</button>
      <a class="btn btn-outline-secondary" href="/">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
